name: Feature request
description: Suggest an enhancement for rabbitkit
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case — what are you trying to do that rabbitkit doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behavior
      description: Sketch the API you'd expect, if you have one in mind.
      render: python
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
