name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv venv && uv pip install -e ".[dev]"
      - name: Ruff
        run: .venv/bin/ruff check src/ tests/ benchmarks/
      - name: mypy
        run: .venv/bin/mypy src/rabbitkit/ --strict --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install uv && uv venv && uv pip install -e ".[dev]"
      # NOTE(coverage): the project aims for ~100% coverage, but the floor is
      # intentionally kept at 85 here so CI stays green while unreachable
      # defensive guards and transport-shim paths are brought under test.
      # Do NOT raise this to 100 — it would break the pipeline. Raise it
      # incrementally as new tests close the gap.
      - name: Tests
        run: .venv/bin/pytest tests/unit/ --ignore=tests/unit/test_readme_examples.py -q --tb=short --cov=src/rabbitkit --cov-report=term-missing --cov-fail-under=85
      # L17: security regression scenarios (signing replay, decompression
      # bombs) and hypothesis property-based round-trip tests. Separate from
      # the coverage-gated run above -- these test the public API as
      # standalone scenarios/properties, not line coverage.
      - name: Security & property tests
        run: .venv/bin/pytest tests/security/ tests/property/ -q --tb=short
      # Loop Engineering Review: execute README.md's own code blocks
      # (syntax + import-path resolution for every block, full execution of
      # the TestBroker example) so the docs can't silently drift from actual
      # behavior. Given its own step (not buried in the coverage-gated run
      # above) so a failure here reads unambiguously as "the README is
      # wrong," not "some unit test broke." This is the class of check that
      # would have caught C1 (retry=RetryConfig(...) documented as working
      # while the middleware was never actually installed) sooner.
      - name: Docs examples
        run: .venv/bin/pytest tests/unit/test_readme_examples.py -q --tb=short

  # Builds the sdist + wheel, validates the long description with `twine
  # check` (the same check PyPI runs at upload time — catches malformed
  # README/metadata before a release attempt), then installs the wheel into
  # a clean venv and does an import smoke test. Catches "works from the repo
  # checkout but the packaged artifact is broken" (missing package data,
  # wrong `packages.find` config, etc.) before it reaches a release.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Install wheel into a clean venv and smoke-test the import
        run: |
          python -m venv /tmp/rabbitkit-install-test
          /tmp/rabbitkit-install-test/bin/pip install dist/*.whl
          /tmp/rabbitkit-install-test/bin/python -c "import rabbitkit; print(rabbitkit.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Integration tests run against a real RabbitMQ broker. Each test module
  # starts its own disposable container via testcontainers (see
  # tests/integration/test_real_rabbitmq.py's `rabbitmq_url` fixture), talking
  # directly to the Docker daemon already present on GitHub-hosted runners —
  # there is no GHA `services:` container here because nothing in the suite
  # connects to one (testcontainers manages the broker's full lifecycle
  # itself, including teardown via its Ryuk reaper sidecar).
  #
  # Gating vs best-effort split:
  #   - The `Integration tests` step is GATING: a real regression in a marked
  #     integration test fails the job. Do NOT swallow its exit code.
  #   - The `Chaos suite` step is best-effort (`continue-on-error: true` on the
  #     step only): the chaos/benchmark suite may be flaky or environment-bound,
  #     so it reports results without failing the pipeline.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv venv && uv pip install -e ".[integration]"
      # GATING: real integration regressions fail the job. `-m integration`
      # selects only marked tests; if none are marked pytest exits 5 (no tests
      # ran), which is treated as a failure so missing tests surface loudly.
      - name: Integration tests
        run: .venv/bin/pytest tests/integration/ -m integration -q --tb=short
      # BEST-EFFORT: the chaos/benchmark suite is allowed to fail without
      # breaking the pipeline (`continue-on-error: true` on this step only).
      - name: Chaos suite (best-effort)
        continue-on-error: true
        env:
          RK_CHAOS_PORT: "32777"
        run: |
          .venv/bin/python -m benchmarks || echo "chaos suite skipped/failed (best-effort)"
