# Builds the mkdocs-material site and publishes it to GitHub Pages
# (https://talaatmagdyx.github.io/rabbitkit/) on every push to main.
# --strict makes broken nav entries / internal links fail the build
# instead of silently shipping a page with dead links.
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time, queued serially. cancel-in-progress must stay
# false: cancelling (or superseding) an in-flight Pages deployment makes
# it fail with "Deployment failed, try again later" — rapid consecutive
# pushes were hitting exactly that.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv venv && uv pip install -e ".[dev]"
      - name: Build site
        run: .venv/bin/mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
