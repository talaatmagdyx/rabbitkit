# Dedicated integration workflow — runs the integration test suite and chaos
# suite against a real RabbitMQ broker. Triggered manually
# (workflow_dispatch) and on nightly schedule so it doesn't block every PR;
# the lightweight `integration` job in `ci.yml` already covers PR-time runs.
#
# Each test module starts its own disposable broker via testcontainers (see
# tests/integration/test_real_rabbitmq.py's `rabbitmq_url` fixture) — there is
# no GHA `services:` container here because nothing in the suite connects to
# one; testcontainers manages the broker's full lifecycle against the Docker
# daemon already present on GitHub-hosted runners.
#
# Gating policy: the nightly run fails loudly on real integration regressions
# (no job-level `continue-on-error`). The chaos/benchmark step remains
# best-effort via a step-level `continue-on-error: true`.
name: Integration

on:
  workflow_dispatch: {}
  schedule:
    # Nightly at 03:30 UTC.
    - cron: "30 3 * * *"

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install uv && uv venv && uv pip install -e ".[integration]"
      # GATING: real integration regressions fail the nightly job.
      - name: Integration tests
        run: .venv/bin/pytest tests/integration/ -m integration -q --tb=short
      # BEST-EFFORT: chaos/benchmark suite — step-level continue-on-error.
      - name: Chaos suite (best-effort)
        continue-on-error: true
        env:
          RK_CHAOS_PORT: "32778"
        run: .venv/bin/python -m benchmarks
      # Advanced tier: interleaved raw-aio-pika A/B overhead, payload/queue-type
      # sweeps, open-loop paced latency. Repeated measurements with CV — see
      # docs/benchmarking.md for how to read them. Best-effort like the classic
      # suite: perf numbers inform, they don't gate.
      - name: Advanced benchmarks (best-effort)
        continue-on-error: true
        run: .venv/bin/python -m benchmarks.advanced
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: ignore

  # Runs every example/ script against a real broker so the examples can't
  # silently drift when the package API changes (they aren't in the wheel,
  # so PR-time checks never touch them). Uses `services:` on the default
  # ports the examples connect to (5672 / 6379). GATING: a broken example is
  # a real doc regression — the runner's exit code is the FAIL count.
  examples:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
          - 15672:15672  # management HTTP API (advanced/06_management_api.py)
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s --health-timeout 10s --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # .[dev] (not .[all]): the pytest-based examples need pytest present.
      - run: pip install uv && uv venv && uv pip install -e ".[dev]"
      - name: Run example smoke test
        run: .venv/bin/python -m examples.smoke_test --timeout 20
