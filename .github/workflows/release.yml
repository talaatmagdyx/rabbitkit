# Tag-triggered build-and-publish to PyPI using trusted publishing (OIDC) —
# no long-lived API token stored as a secret. Configure this once on PyPI:
# https://pypi.org/manage/project/rabbitkit/settings/publishing/
# (add a trusted publisher for this repo, workflow file `release.yml`,
# environment `pypi`), before the first tag push.
#
# Trigger: push a tag matching `v*` (e.g. `v1.1.0`) that matches the version
# in pyproject.toml. Bump `_version.py` AND `pyproject.toml` together (per
# project convention), commit, then tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # A tag alone never appears in the repo's Releases list — v0.10.0 shipped
  # to PyPI with no visible GitHub Release until one was created by hand.
  # Create it automatically, with the notes extracted from the tag's own
  # CHANGELOG section, and attach the built artifacts.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract this version's CHANGELOG section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - "$VERSION" <<'EOF'
          import sys
          version = sys.argv[1]
          s = open("CHANGELOG.md").read()
          marker = f"## [{version}]"
          if marker not in s:
              # Tag without a matching CHANGELOG section — still make a release.
              notes = f"See CHANGELOG.md for {version}."
          else:
              start = s.index(marker)
              body = s[s.index("\n", start) + 1 :]
              end = body.find("\n## [")
              notes = body[: end if end != -1 else len(body)].strip()
          notes += (
              f"\n\n---\n\n**Install:** `pip install rabbitkit=={version}`\n"
              "**Upgrade guide:** https://github.com/talaatmagdyx/rabbitkit/blob/main/docs/migration.md\n"
          )
          open("/tmp/notes.md", "w").write(notes)
          EOF
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "rabbitkit $GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md \
            --verify-tag
